<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Poppins;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  padding:15px;
  background:#020617;
}

header img{
  width:40px;
  margin-right:10px;
}

/* TITLE */
h1{
  text-align:center;
  margin:20px;
}

/* CONTAINER */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  width:220px;
  padding:20px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:80px;
  margin-bottom:10px;
}

/* BACK BUTTON */
.back-btn{
  display:block;
  width:max-content;
  margin:30px auto;
  padding:10px 20px;
  border-radius:20px;
  background:#38bdf8;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.back-btn:hover{
  background:#0284c7;
}
</style>
</head>

<header>
  <img src="GM.png"> Gupta Motors
</header>

  </div>

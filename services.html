<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services - Gupta Motors</title>

<!-- Favicon -->
<link rel="icon" href="GM.png">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body{
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  padding:15px 30px;
  background:#020617;
}

header img{
  width:40px;
  margin-right:10px;
}

/* TITLE */
h1{
  text-align:center;
  margin:20px;
  color:#38bdf8;
}

/* CARDS */
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  padding:30px;
}

.container a{
  text-decoration:none;
  color:white;
}

.card{
  width:250px;
  padding:20px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-10px);
  border-color:#38bdf8;
}

/* BACK BUTTON */
.back-btn{
  display:block;
  width:max-content;
  margin:30px auto;
  padding:10px 20px;
  border-radius:20px;
  background:#38bdf8;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.back-btn:hover{
  background:#0284c7;
}
</style>
</head>

<body>

<header>
  <img src="GM.png">
  <h2>Gupta Motors</h2>
</header>

<h1>Our Services</h1>

<div class="container">

  <!-- ELECTRONICS -->
  <a href="electronics.html">
    <div class="card">
      <h3>Electronics</h3>
      <p>Wholesale electronics from trusted brands.</p>
    </div>
  </a>

  <!-- REPAIR -->
  <div class="card">
    <h3>Repair</h3>
    <p>Fast and reliable repair services.</p>
  </div>

  <!-- SUPPORT -->
  <div class="card">
    <h3>Support</h3>
    <p>24/7 customer support.</p>
  </div>

</div>

<!-- BACK TO HOME -->
<a href="index.html" class="back-btn">⬅ Back to Home</a>

</body>
</html>
